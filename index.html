<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grumpy Goblin</title>
    <style>
        /* Force light mode so mobile phones don't invert colors */
        :root {
            color-scheme: light;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff !important;
            color: #000000 !important;
            padding: 20px;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 0 0 30px 0;
            text-transform: uppercase;
            text-align: center;
        }

        .interface-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start; 
            gap: 20px;
            width: 100%;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label {
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* The Emotion Click Box */
        #emotion-box {
            -webkit-appearance: none !important;
            appearance: none !important;
            width: 120px;
            height: 60px;
            border: 3px solid #000 !important;
            background-color: #ffffff !important;
            color: #000000 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
            border-radius: 0 !important;
            font-size: 0.9rem;
        }

        /* The Text Input */
        #user-input {
            -webkit-appearance: none !important;
            width: 100%;
            min-width: 300px;
            height: 60px;
            border: 3px solid #000 !important;
            background-color: #ffffff !important;
            color: #000000 !important;
            padding: 0 15px;
            font-size: 1.1rem;
            box-sizing: border-box;
            font-family: inherit;
            border-radius: 0 !important;
        }

        .submit-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        /* The Submit Button - Force black text */
        #submit-btn {
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
            background-color: #ffffff !important;
            color: #000000 !important; /* Force black text */
            border: 3px solid #000000 !important;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 !important;
            text-transform: none;
        }

        #submit-btn:hover, #submit-btn:active {
            background-color: #000000 !important;
            color: #ffffff !important;
        }

        /* Mobile View - Stacked */
        @media (max-width: 600px) {
            .interface-row {
                flex-direction: column;
                align-items: center;
                gap: 30px;
            }
            .column {
                width: 100%;
                align-items: center;
            }
            #user-input {
                min-width: unset;
                width: 90vw;
            }
            #emotion-box {
                width: 150px;
                height: 80px;
            }
        }

        #status {
            margin-top: 15px;
            font-size: 1rem;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Grumpy Goblin</h1>

        <form id="goblin-form" style="width: 100%;">
            <div class="interface-row">
                <div class="column">
                    <div class="label">Emotion</div>
                    <button type="button" id="emotion-box">Click Here</button>
                    <input type="hidden" name="emotion" id="hidden-emotion" value="None">
                </div>

                <div class="column" style="flex-grow: 1;">
                    <div class="label">Whats on your mind?</div>
                    <input type="text" name="message" id="user-input" required autocomplete="off">
                    
                    <div class="submit-container">
                        <button type="submit" id="submit-btn">Submit</button>
                    </div>
                </div>
            </div>
        </form>
        <p id="status"></p>
    </div>

    <script src="app.js"></script>
</body>
</html>
