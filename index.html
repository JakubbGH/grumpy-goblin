<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grumpy Goblin</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fff;
            padding: 20px;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem); /* Shrinks title on small screens */
            margin: 0 0 30px 0;
            text-transform: uppercase;
            text-align: center;
        }

        /* Desktop Layout */
        .interface-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start; 
            gap: 20px;
            width: 100%;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Labels and Boxes */
        .label {
            font-size: 1.1rem;
            font-weight: bold;
        }

        #emotion-box {
            width: 120px;
            height: 60px;
            border: 3px solid #000;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
        }

        #user-input {
            width: 100%;
            min-width: 300px;
            height: 60px;
            border: 3px solid #000;
            padding: 0 15px;
            font-size: 1.1rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        .submit-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        #submit-btn {
            border: 3px solid #000;
            background: #fff;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
        }

        /* --- MOBILE VIEW --- */
        @media (max-width: 600px) {
            .interface-row {
                flex-direction: column; /* Stack vertically */
                align-items: center;    /* Center everything */
                gap: 30px;
            }

            .column {
                width: 100%;
                align-items: center; /* Center labels over boxes on mobile */
            }

            #user-input {
                min-width: unset;
                width: 90vw; /* Input takes up most of the screen width */
            }

            #emotion-box {
                width: 150px; /* Slightly bigger button for thumbs */
                height: 80px;
            }
        }

        #status {
            margin-top: 15px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Grumpy Goblin</h1>

        <form id="goblin-form" style="width: 100%;">
            <div class="interface-row">
                <div class="column">
                    <div class="label">Emotion</div>
                    <button type="button" id="emotion-box">Click Here</button>
                    <input type="hidden" name="emotion" id="hidden-emotion" value="None">
                </div>

                <div class="column" style="flex-grow: 1;">
                    <div class="label">Whats on your mind?</div>
                    <input type="text" name="message" id="user-input" required>
                    
                    <div class="submit-container">
                        <button type="submit" id="submit-btn">Submit</button>
                    </div>
                </div>
            </div>
        </form>
        <p id="status"></p>
    </div>

    <script src="app.js"></script>
</body>
</html>
