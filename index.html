<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grumpy Goblin</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fff;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the Title and the Interface */
            width: fit-content;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 40px 0;
            text-transform: uppercase;
            text-align: center;
        }

        /* This row holds the two columns side-by-side */
        .interface-row {
            display: flex;
            align-items: flex-start; 
            gap: 20px;
        }

        /* Each column handles Label + Box vertically */
        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Emotion/Emoji Box */
        #emotion-box {
            width: 120px;
            height: 60px;
            border: 3px solid #000;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }

        /* Text Input Box */
        #user-input {
            width: 400px;
            height: 60px;
            border: 3px solid #000;
            padding: 0 15px;
            font-size: 1.2rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* Submit button aligned to the right of the input box column */
        .submit-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        #submit-btn {
            border: 3px solid #000;
            background: #fff;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
        }

        #submit-btn:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Grumpy Goblin</h1>

        <div class="interface-row">
            <div class="column">
                <div class="label">Emotion</div>
                <button id="emotion-box">Click Here</button>
            </div>

            <div class="column">
                <div class="label">Whats on your mind?</div>
                <input type="text" id="user-input">
                
                <div class="submit-container">
                    <button id="submit-btn">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
