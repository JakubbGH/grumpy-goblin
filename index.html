<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grumpy Goblin</title>
    <link rel="stylesheet" href="style.css"> </head>
<body style="background-color: #2e3b23; color: #f0e68c; font-family: 'Courier New', monospace; text-align: center;">

    <h1>👹 Grumpy Goblin</h1>

    <div id="emoji-display" style="font-size: 100px; border: 4px dashed #4a5d3a; width: 150px; height: 150px; margin: 20px auto; display: flex; align-items: center; justify-content: center;">
        ❌
    </div>

    <div class="input-container">
        <input type="text" id="user-input" placeholder="Say something to the goblin..." style="padding: 10px; width: 250px;">
        <button id="submit-btn" style="padding: 10px; cursor: pointer; background: #5d4037; color: white; border: none;">Submit</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
