<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grumpy Goblin</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fff;
        }

        /* Centers everything in the middle of the screen */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; 
            width: fit-content;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 40px 0;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
        }

        /* This row holds the Emotion Box and the Input Box */
        .interaction-container {
            display: flex;
            align-items: flex-end; /* Bottom alignment */
            gap: 20px;
        }

        .box-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label {
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Emotion/Emoji Box */
        #emotion-box {
            width: 110px;
            height: 55px;
            border: 3px solid #000;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }

        /* Text Input Box */
        #user-input {
            width: 350px;
            height: 55px;
            border: 3px solid #000;
            padding: 0 12px;
            font-size: 1.1rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* Submit button positioning */
        .submit-container {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }

        #submit-btn {
            border: 3px solid #000;
            background: #fff;
            padding: 8px 20px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
        }

        #submit-btn:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Grumpy Goblin</h1>

        <div class="interaction-container">
            <div class="box-group">
                <div class="label">Emotion</div>
                <button id="emotion-box">Click Here</button>
            </div>

            <div class="box-group">
                <div class="label">Whats on your mind?</div>
                <input type="text" id="user-input">
                <div class="submit-container">
                    <button id="submit-btn">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
