<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grumpy Goblin</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        .main-ui {
            display: flex;
            align-items: flex-end; /* Aligns the bottom of the boxes */
            gap: 15px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* The Emotion Box */
        #emotion-box {
            width: 100px;
            height: 60px;
            border: 3px solid #000;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            padding: 5px;
        }

        /* The Text Input */
        #user-input {
            width: 400px;
            height: 60px;
            border: 3px solid #000;
            font-size: 1.2rem;
            padding: 0 15px;
            box-sizing: border-box;
        }

        /* Submit Button alignment */
        .submit-wrapper {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        #submit-btn {
            border: 3px solid #000;
            background: white;
            padding: 8px 25px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
        }

        #submit-btn:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <h1>GRUMPY GOBLIN</h1>

    <div class="main-ui">
        <div class="column">
            <div class="label">Emotion</div>
            <button id="emotion-box">Click Here</button>
        </div>

        <div class="column">
            <div class="label">Whats on your mind?</div>
            <input type="text" id="user-input">
            <div class="submit-wrapper">
                <button id="submit-btn">Submit</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
