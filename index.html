<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grumpy Goblin</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👹</text></svg>">

    <style>
        /* Force light mode to prevent mobile color inversion/Dark Mode issues */
        :root { color-scheme: light; }

        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff !important;
            color: #000000 !important;
            padding: 20px;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 0 0 40px 0;
            text-transform: uppercase;
            text-align: center;
        }

        .interface-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start; 
            gap: 20px;
            width: 100%;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label {
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Input Boxes Styling - Mobile Fixes Applied */
        #emotion-box, #user-input {
            -webkit-appearance: none !important;
            appearance: none !important;
            border: 3px solid #000 !important;
            background-color: #ffffff !important;
            color: #000000 !important;
            font-family: inherit;
            border-radius: 0 !important;
            height: 60px;
            box-sizing: border-box;
        }

        #emotion-box {
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
        }

        #user-input {
            width: 100%;
            min-width: 300px;
            padding: 0 15px;
            font-size: 1.1rem;
        }

        /* Button Container */
        .button-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            margin-top: 15px;
        }

        /* Standard Submit Button */
        #submit-btn {
            -webkit-appearance: none !important;
            appearance: none !important;
            background-color: #ffffff !important;
            color: #000000 !important;
            border: 3px solid #000000 !important;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 !important;
        }

        #submit-btn:hover, #submit-btn:active {
            background-color: #000000 !important;
            color: #ffffff !important;
        }

        /* Give me Attention Button */
        #attention-btn {
            -webkit-appearance: none !important;
            appearance: none !important;
            background-color: #ff0000 !important;
            color: #ffffff !important;
            border: 3px solid #000000 !important;
            padding: 10px 20px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 !important;
        }

        #attention-btn:active {
            background-color: #b30000 !important;
        }

        /* Mobile View (Stacked for small screens) */
        @media (max-width: 600px) {
            .interface-row { flex-direction: column; align-items: center; gap: 30px; }
            .column { width: 100%; align-items: center; }
            #user-input { width: 90vw; min-width: unset; }
            #emotion-box { width: 150px; height: 80px; }
            .button-stack { align-items: center; width: 100%; }
        }

        #status {
            margin-top: 20px;
            font-size: 1rem;
            text-align: center;
            font-weight: bold;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Grumpy Goblin</h1>

        <form id="goblin-form" style="width: 100%;">
            <div class="interface-row">
                <div class="column">
                    <div class="label">Emotion</div>
                    <button type="button" id="emotion-box">Click Here</button>
                    <input type="hidden" id="hidden-emotion" value="None">
                </div>

                <div class="column" style="flex-grow: 1;">
                    <div class="label">Whats on your mind?</div>
                    <input type="text" id="user-input" required autocomplete="off">
                    
                    <div class="button-stack">
                        <button type="submit" id="submit-btn">Submit</button>
                        <button type="button" id="attention-btn">Give me Attention</button>
                    </div>
                </div>
            </div>
        </form>
        <p id="status"></p>
    </div>

    <script>
        const emotionBox = document.getElementById('emotion-box');
        const hiddenEmotion = document.getElementById('hidden-emotion');
        const form = document.getElementById('goblin-form');
        const status = document.getElementById('status');
        const userInput = document.getElementById('user-input');
        const attentionBtn = document.getElementById('attention-btn');

        // Helper for the loop delay
        const delay = ms => new Promise(res => setTimeout(res, ms));
        let isLooping = false;

        // 1. Emotion Cycling Logic
        const moods = ["Click Here", "😊", "😠", "😢", "😐"];
        let moodIndex = 0;

        emotionBox.addEventListener('click', () => {
            moodIndex = (moodIndex + 1) % moods.length;
            const currentMood = moods[moodIndex];
            emotionBox.textContent = currentMood;
            hiddenEmotion.value = currentMood;
            
            if (currentMood === "Click Here") {
                emotionBox.style.fontSize = "0.9rem";
            } else {
                emotionBox.style.fontSize = "2.8rem";
            }
        });

        // 2. Standard Submit: Discord + IFTTT Govee
        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const messageText = userInput.value;
            const currentEmotion = hiddenEmotion.value;

            status.style.color = "black";
            status.innerHTML = "Recording goblin grumbles...";

            const discordWebhookUrl = "https://discord.com/api/webhooks/1489290884833869994/sj6t6kHTiHvac9p4ctyz2wsJy2K_JVESh7zW0p7_i6u-s49rkcmDpDA-5dawCZZhQ-qY";
            const iftttGoveeUrl = "https://maker.ifttt.com/trigger/Grumpy Goblin Govee/with/key/bmiQfTI93vgLEWj3afOTH3IfcabgeX_iwA7o3lasmw5";

            const discordPayload = {
                username: "Grumpy Goblin",
                avatar_url: "https://emoji.slack-edge.com/T024FPH1Z/goblin/d6074a3861.png",
                content: `**New Grumble Received!**\n**Emotion:** ${currentEmotion}\n**Message:** ${messageText}`
            };

            try {
                await Promise.all([
                    fetch(discordWebhookUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(discordPayload)
                    }),
                    fetch(iftttGoveeUrl, { method: "POST", mode: 'no-cors' })
                ]);

                status.style.color = "green";
                status.innerHTML = "Your goblin grumble has been received.";
                form.reset();
                emotionBox.textContent = "Click Here";
                emotionBox.style.fontSize = "0.9rem";
                hiddenEmotion.value = "None";
            } catch (e) {
                status.style.color = "red";
                status.innerHTML = "The goblin minder is busy (Connection Error).";
            }
        });

        // 3. Give me Attention: 10-Round Webhook Loop
        attentionBtn.addEventListener('click', async () => {
            if (isLooping) return; // Prevent spamming the loop
            
            isLooping = true;
            status.style.color = "red";

            const webhookOne = "https://maker.ifttt.com/trigger/Goblin Attention/with/key/bmiQfTI93vgLEWj3afOTH3IfcabgeX_iwA7o3lasmw5";
            const webhookTwo = "https://maker.ifttt.com/trigger/Goblin Attention2/with/key/bmiQfTI93vgLEWj3afOTH3IfcabgeX_iwA7o3lasmw5";

            try {
                for (let i = 1; i <= 10; i++) {
                    status.innerHTML = `🚨 Demanding attention (${i}/10)... 🚨`;

                    // Send first Webhook
                    fetch(webhookOne, { method: "POST", mode: 'no-cors' });
                    await delay(1000);

                    // Send second Webhook
                    fetch(webhookTwo, { method: "POST", mode: 'no-cors' });
                    await delay(1000);
                }

                status.style.color = "green";
                status.innerHTML = "Attention sequence complete!";
            } catch (error) {
                status.style.color = "red";
                status.innerHTML = "The goblin sequence was interrupted.";
            } finally {
                isLooping = false;
                setTimeout(() => { if (!isLooping) status.innerHTML = ""; }, 3000);
            }
        });
    </script>
</body>
</html>
