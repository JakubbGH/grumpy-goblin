<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grumpy Goblin</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff;
        }

        .main-container {
            width: 600px;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            letter-spacing: 5px;
        }

        .interface-row {
            display: flex;
            align-items: flex-end;
            gap: 20px;
        }

        .emotion-section {
            text-align: center;
        }

        #emotion-box {
            width: 80px;
            height: 80px;
            border: 3px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            background: none;
            user-select: none;
        }

        .input-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .label-text {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        #user-input {
            width: 100%;
            height: 50px;
            border: 3px solid #000;
            font-size: 1.2rem;
            padding: 5px 10px;
            box-sizing: border-box;
        }

        .submit-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        #submit-btn {
            border: 3px solid #000;
            background: white;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
        }

        #submit-btn:active {
            background: #eee;
        }
    </style>
</head>
<body>

    <h1>Grumpy Goblin</h1>

    <div class="main-container">
        <div class="interface-row">
            <div class="emotion-section">
                <div style="margin-bottom: 5px;">Emotion</div>
                <button id="emotion-box">X</button>
            </div>

            <div class="input-section">
                <div class="label-text">Whats on your mind?</div>
                <input type="text" id="user-input">
                <div class="submit-container">
                    <button id="submit-btn">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
