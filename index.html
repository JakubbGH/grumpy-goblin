<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grumpy Goblin</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fff;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; 
            width: fit-content;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 50px 0;
            text-transform: uppercase;
            text-align: center;
        }

        /* This is the main row that lines everything up */
        .main-row {
            display: flex;
            align-items: center; /* This keeps labels and boxes perfectly level */
            gap: 15px;
        }

        .label {
            font-size: 1.1rem;
            font-weight: bold;
            white-space: nowrap; /* Prevents text from wrapping */
        }

        /* Emotion/Emoji Box */
        #emotion-box {
            width: 120px;
            height: 50px;
            border: 3px solid #000;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            margin-right: 10px;
        }

        /* Text Input Box */
        #user-input {
            width: 300px;
            height: 50px;
            border: 3px solid #000;
            padding: 0 12px;
            font-size: 1.1rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* Submit button positioning - pushed to the right under the input */
        .footer-row {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        #submit-btn {
            border: 3px solid #000;
            background: #fff;
            padding: 8px 20px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
        }

        #submit-btn:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Grumpy Goblin</h1>

        <div class="main-row">
            <div class="label">Emotion</div>
            <button id="emotion-box">Click Here</button>

            <div class="label">Whats on your mind?</div>
            <input type="text" id="user-input">
        </div>

        <div class="footer-row">
            <button id="submit-btn">Submit</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
